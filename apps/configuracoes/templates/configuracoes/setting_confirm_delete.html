{% extends "layouts/app.html" %}
{% load divsystem %}
{% block title %}Excluir configuração{% endblock %}
{% block page_title %}Excluir configuração{% endblock %}

{% block content %}
<form method="post" class="card max-w-lg">
  {% csrf_token %}
  <div class="card-body"><p>Excluir a chave <strong>{{ object.key }}</strong>?</p></div>
  <div class="card-header bg-zinc-50/60 justify-end">
    <a href="{% url 'configuracoes:list' %}" class="btn-secondary">Cancelar</a>
    <button class="btn-danger">Excluir</button>
  </div>
</form>
{% endblock %}
