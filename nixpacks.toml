providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "postgresql", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "gunicorn divsystem.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 60 --access-logfile -"
