{% load divsystem static %}<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-zinc-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}{{ APP_NAME }}{% endblock %} · {{ APP_TAGLINE }}</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link rel="alternate icon" href="{% static 'favicon.ico' %}">
  <link rel="apple-touch-icon" href="{% static 'apple-touch-icon.png' %}">
  <link rel="stylesheet" href="{% static 'css/divsystem.css' %}">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js" defer></script>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full antialiased text-zinc-800">
  {% block body %}{% endblock %}
</body>
</html>
